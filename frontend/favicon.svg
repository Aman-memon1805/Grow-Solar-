<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#0D0D0D"/>

  <!-- Sun rays -->
  <line x1="100" y1="18" x2="100" y2="8" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="28" x2="58" y2="20" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>
  <line x1="136" y1="28" x2="142" y2="20" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>
  <line x1="40" y1="58" x2="32" y2="53" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="58" x2="168" y2="53" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>

  <!-- Half sun -->
  <clipPath id="half">
    <rect x="30" y="70" width="140" height="70"/>
  </clipPath>
  <circle cx="100" cy="70" r="46" fill="#FF6B00" clip-path="url(#half)"/>
  <circle cx="100" cy="70" r="30" fill="#FFB347" clip-path="url(#half)"/>

  <!-- Solar panel -->
  <rect x="36" y="74" width="128" height="72" rx="4" fill="#161616" stroke="#FF6B00" stroke-width="2.5"/>
  <!-- Panel grid vertical -->
  <line x1="79" y1="74" x2="79" y2="146" stroke="#FF6B00" stroke-width="1.5" opacity="0.6"/>
  <line x1="121" y1="74" x2="121" y2="146" stroke="#FF6B00" stroke-width="1.5" opacity="0.6"/>
  <!-- Panel grid horizontal -->
  <line x1="36" y1="109" x2="164" y2="109" stroke="#FF6B00" stroke-width="1.5" opacity="0.6"/>

  <!-- Divider -->
  <line x1="36" y1="158" x2="164" y2="158" stroke="#FF6B00" stroke-width="1.5" opacity="0.4"/>

  <!-- GROW text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial Black, Arial" font-size="26" font-weight="900" fill="#FF6B00" letter-spacing="3">GROW</text>

  <!-- SOLAR text -->
  <text x="100" y="196" text-anchor="middle" font-family="Arial Black, Arial" font-size="26" font-weight="900" fill="#ffffff" letter-spacing="3">SOLAR</text>
</svg>
