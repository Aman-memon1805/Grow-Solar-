<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Outer dark circle -->
  <circle cx="50" cy="50" r="50" fill="#0D0D0D"/>

  <!-- Sun glow ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.3"/>

  <!-- Sun body -->
  <circle cx="50" cy="50" r="36" fill="#FF6B00"/>

  <!-- Sun inner bright center -->
  <circle cx="50" cy="50" r="24" fill="#FFB347"/>

  <!-- Sun rays -->
  <line x1="50" y1="6"  x2="50" y2="1"  stroke="#FF6B00" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="94" x2="50" y2="99" stroke="#FF6B00" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="6"  y1="50" x2="1"  y2="50" stroke="#FF6B00" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="94" y1="50" x2="99" y2="50" stroke="#FF6B00" stroke-width="3.5" stroke-linecap="round"/>

  <line x1="19" y1="19" x2="15" y2="15" stroke="#FF6B00" stroke-width="3" stroke-linecap="round"/>
  <line x1="81" y1="19" x2="85" y2="15" stroke="#FF6B00" stroke-width="3" stroke-linecap="round"/>
  <line x1="19" y1="81" x2="15" y2="85" stroke="#FF6B00" stroke-width="3" stroke-linecap="round"/>
  <line x1="81" y1="81" x2="85" y2="85" stroke="#FF6B00" stroke-width="3" stroke-linecap="round"/>

  <!-- GS text bold and readable -->
  <text
    x="50" y="58"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="28"
    font-weight="900"
    fill="#0D0D0D"
    letter-spacing="-1">GS</text>

</svg>
